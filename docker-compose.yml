services:

  # ── Mock University Website ──────────────────────────────────────────────
  mock-site:
    image: nginx:alpine
    container_name: northbridge-site
    ports:
      - "8080:80"
    volumes:
      - ./mock-site:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Auto-Generated FastAPI Scraper ───────────────────────────────────────
  autoapi:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: hermes-autoapi
    ports:
      - "8000:8000"
    volumes:
      - api-state:/app
      - ./agent:/agent-src:ro   # agent can hot-swap files here
    environment:
      - TARGET_URL=http://mock-site:80
      - API_VERSION=v1
    depends_on:
      mock-site:
        condition: service_healthy
    restart: unless-stopped

  # ── Health Monitor / Self-Healing Orchestrator ───────────────────────────
  health-monitor:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: hermes-healer
    volumes:
      - api-state:/app
      - ./agent:/agent-src:ro
      - ./scripts:/scripts:ro
    environment:
      - API_BASE=http://autoapi:8000
      - TARGET_URL=http://mock-site:80
    depends_on:
      - autoapi
    command: python /scripts/health_check.py --watch 30
    restart: unless-stopped

volumes:
  api-state:
