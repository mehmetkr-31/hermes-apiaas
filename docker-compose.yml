services:
  hermes-agent:
    build:
      context: .
      dockerfile: packages/agent/Dockerfile
    container_name: hermes-agent
    env_file:
      - .env
    environment:
      - HERMES_PROJECT_ROOT=/app
      - HERMES_DATA_DIR=/app/.tmp
      - WEBHOOK_PORT=8678
    volumes:
      - ./local.db:/app/local.db
      - ./.tmp:/app/.tmp
      - ./logs:/app/logs
      - ${GH_CONFIG_DIR:-~/.config/gh}:/root/.config/gh
    ports:
      - "8678:8678"
    restart: unless-stopped

  agi-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: agi-web
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/local.db
      - BETTER_AUTH_URL=http://localhost:3678
      - PORT=3678
      - HERMES_AGENT_URL=http://hermes-agent:8678
    volumes:
      - ./local.db:/app/local.db
      - ${GH_CONFIG_DIR:-~/.config/gh}:/root/.config/gh
    ports:
      - "3678:3678"
    restart: unless-stopped
    depends_on:
      - hermes-agent
