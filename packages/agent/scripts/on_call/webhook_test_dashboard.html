<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Webhook Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --sentry: #e1567c;
            --vercel: #ffffff;
            --cloudflare: #f38020;
            --github: #2ea44f;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(225, 86, 124, 0.1) 0%, transparent 40%);
        }

        .dashboard {
            width: 100%;
            max-width: 900px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(to right, #6366f1, #e1567c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .repo-info {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            border: 1px solid var(--card-border);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            padding: 24px;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .card i {
            font-size: 2rem;
            display: block;
            margin-bottom: 12px;
        }

        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--card-border);
        }

        .btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .card[data-provider="sentry"]:hover { border-color: var(--sentry); }
        .card[data-provider="vercel"]:hover { border-color: var(--vercel); }
        .card[data-provider="cloudflare"]:hover { border-color: var(--cloudflare); }
        .card[data-provider="github"]:hover { border-color: var(--github); }

        .console {
            background: #000;
            padding: 20px;
            border-radius: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #10b981;
            height: 200px;
            overflow-y: auto;
            border: 1px solid var(--card-border);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .console-line {
            margin-bottom: 4px;
            display: flex;
        }

        .console-time { color: #4b5563; margin-right: 10px; }
        .console-success { color: #10b981; }
        .console-error { color: #ef4444; }
        .console-info { color: #3b82f6; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Hermes Webhook Stimulator</h1>
            <p class="subtitle">Simulate external service events for testing agent logic</p>
            <div class="repo-info">Target: aLjTap/webTech</div>
            
            <div style="margin-top: 20px; display: flex; justify-content: center; gap: 10px;">
                <input type="text" id="base_url" value="http://localhost:8678" 
                       style="background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: var(--text); padding: 8px 15px; border-radius: 10px; width: 300px; font-family: 'JetBrains Mono';">
                <span style="color: var(--text-muted); align-self: center;">Base Webhook URL</span>
            </div>
        </header>

        <div class="grid">
            <!-- Sentry -->
            <div class="card" data-provider="sentry">
                <h3>Sentry</h3>
                <button type="button" class="btn" onclick="sendWebhook('sentry')">Trigger Error</button>
            </div>

            <!-- Vercel -->
            <div class="card" data-provider="vercel">
                <h3>Vercel</h3>
                <button type="button" class="btn" onclick="sendWebhook('vercel')">Build Failure</button>
            </div>

            <!-- Cloudflare -->
            <div class="card" data-provider="cloudflare">
                <h3>Cloudflare</h3>
                <button type="button" class="btn" onclick="sendWebhook('cloudflare')">Pages Error</button>
            </div>

            <!-- GitHub -->
            <div class="card" data-provider="github">
                <h3>GitHub</h3>
                <button type="button" class="btn" onclick="sendWebhook('github')">New Issue</button>
            </div>
        </div>

        <div class="console" id="console">
            <div class="console-line">
                <span class="console-time">[READY]</span>
                <span>Simulator initialized. Awaiting triggers...</span>
            </div>
        </div>
    </div>

    <script>
        const OWNER = 'aLjTap';
        const REPO = 'webTech';

        function log(msg, type = 'info') {
            const consoleEl = document.getElementById('console');
            const line = document.createElement('div');
            line.className = 'console-line';
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            line.innerHTML = `<span class="console-time">[${time}]</span><span class="console-${type}">${msg}</span>`;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        /* biome-ignore lint/correctness/noUnusedVariables: Used in HTML onclick */
        async function sendWebhook(provider) {
            const baseUrl = document.getElementById('base_url').value.replace(/\/$/, '');
            log(`Triggering ${provider} webhook via ${baseUrl}...`, 'info');
            
            let url = '';
            let payload = {};

            switch(provider) {
                case 'sentry':
                    url = `${baseUrl}/sentry/webhook/${OWNER}/${REPO}`;
                    payload = {
                        action: "created",
                        data: {
                            issue: {
                                id: "SIM-" + Math.floor(Math.random() * 10000),
                                title: "ReferenceError: process is not defined at Dashboard.tsx:42",
                                permalink: "https://sentry.io/simulate/issue/123",
                                culprit: "src/routes/dashboard.tsx",
                                project: { slug: "web-tech-fe" }
                            }
                        }
                    };
                    break;
                case 'vercel':
                    url = `${BASE_URL}/vercel/webhook/${OWNER}/${REPO}`;
                    payload = {
                        type: "deployment.error",
                        payload: {
                            deployment: {
                                id: "dpl_" + Math.random().toString(36).substr(2, 9),
                                url: "https://webtech-failed.vercel.app"
                            },
                            project: { name: "webtech" }
                        }
                    };
                    break;
                case 'cloudflare':
                    url = `${BASE_URL}/cloudflare/webhook/${OWNER}/${REPO}`;
                    payload = {
                        project_name: "webtech-pages",
                        status: "failure",
                        environment: "production"
                    };
                    break;
                case 'github':
                    url = `${BASE_URL}/github/webhook`;
                    payload = {
                        action: "opened",
                        issue: {
                            number: Math.floor(Math.random() * 500) + 1,
                            title: "Bug: Data not loading on mobile view",
                            body: "The dashboard fails to load data when viewed from a mobile device."
                        },
                        repository: {
                            full_name: `${OWNER}/${REPO}`,
                            owner: { login: OWNER },
                            name: REPO
                        }
                    };
                    break;
            }

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-GitHub-Event': provider === 'github' ? 'issues' : undefined
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    log(`Success: ${provider} event accepted by receiver.`, 'success');
                } else {
                    const text = await response.text();
                    log(`Error: ${response.status} - ${text}`, 'error');
                }
            } catch (err) {
                log(`Network Error: ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
